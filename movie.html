<!-- =========================
     MOVIE DETAILS PAGE
========================= -->

<section class="movie-details-page">


<div class="movie-hero">


    <div class="movie-backdrop"></div>



    <div class="movie-content">



        <!-- POSTER -->

        <div class="movie-poster">

            <img 
            id="moviePoster"
            src="assets/images/no-image.jpg"
            alt="Movie Poster">

        </div>





        <!-- INFO -->

        <div class="movie-info-box">


            <h1 id="movieTitle">
                Movie Title
            </h1>




            <div class="movie-meta">


                <span id="movieRating">
                    ⭐ 0.0
                </span>


                <span id="movieYear">
                    2026
                </span>


                <span id="movieRuntime">
                    120 min
                </span>


                <span id="moviePopularity">
                    Popularity
                </span>


            </div>





            <!-- GENRES -->

            <div 
            class="genres"
            id="movieGenres">

            </div>







            <p 
            id="movieDescription"
            class="movie-description">

            Movie description

            </p>







            <!-- BUTTONS -->

            <div class="hero-buttons">


                <button 
                class="watch">

                ▶ Watch Trailer

                </button>




                <button
                id="watchlistBtn"
                class="info">

                + Add To My List

                </button>


            </div>



        </div>


    </div>


</div>
