<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details | TRAP MOVIES</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Reusing the Header -->
    <header class="navbar">
        <div class="logo">TRAP MOVIES</div>
        <nav><ul class="nav-links"><li><a href="index.html">Home</a></li></ul></nav>
    </header>

    <main class="details-container">
        <!-- Movie Poster Area -->
        <div class="movie-poster">
            <img src="https://via.placeholder.com/300x450" alt="Movie Poster">
        </div>

        <!-- Movie Information Area -->
        <div class="movie-info">
            <h1>Movie Title</h1>
            <p class="meta">Year | Genre | Rating</p>
            <p class="synopsis">This is where the plot summary will go. It explains the movie story.</p>
            
            <div class="action-buttons">
                <button class="play-btn">▶ Watch Now</button>
            </div>
        </div>
    </main>

</body>
</html>
