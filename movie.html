<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>TRAP MOVIES | Movie Details</title>


<link rel="stylesheet" href="style.css">


<link 
rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<link 
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" 
rel="stylesheet">


</head>


<body>



<!-- =========================
        HEADER
========================= -->


<header class="header">


<div class="menu-btn">

<i class="fa-solid fa-bars"></i>

</div>



<div class="logo">

TRAP 
<span>MOVIES</span>

</div>




<div class="search-btn">

<i class="fa-solid fa-magnifying-glass"></i>

</div>



</header>







<!-- =========================
        MOVIE DETAILS
========================= -->


<main class="movie-details-page">





<section class="movie-hero">



<div class="movie-backdrop"></div>





<div class="movie-content">





<div class="movie-poster">


<img 
id="moviePoster"
src="assets/images/no-image.jpg"
alt="Movie Poster">


</div>







<div class="movie-info-box">



<h1 id="movieTitle">

Loading...

</h1>






<div class="movie-meta">


<span id="movieRating">

⭐ 0.0

</span>



<span id="movieYear">

2026

</span>



<span id="movieRuntime">

120 min

</span>


</div>






<div class="genres" id="movieGenres">


</div>








<p id="movieDescription">

Loading movie information...

</p>








<div class="movie-actions">



<button class="watch">


<i class="fa-solid fa-play"></i>

Watch Trailer


</button>




<button class="info">


<i class="fa-solid fa-bookmark"></i>

Add To List


</button>



</div>





</div>





</div>



</section>








<!-- =========================
        TRAILER
========================= -->


<section class="trailer-section">


<h2>

🎬 Official Trailer

</h2>



<div class="trailer-box" id="trailerBox">


<p>

Trailer loading...

</p>


</div>



</section>








<!-- =========================
        CAST
========================= -->


<section class="cast-section">


<h2>

⭐ Cast

</h2>




<div class="cast-container" id="castContainer">


</div>




</section>








<!-- =========================
        SIMILAR MOVIES
========================= -->


<section class="similar-section">


<h2>

🔥 Similar Movies

</h2>




<div class="movie-container" id="similarMovies">


</div>




</section>






</main>







<!-- =========================
        FOOTER
========================= -->


<footer>


<h2>

TRAP MOVIES

</h2>



<p>

Discover • Watch • Enjoy 🎬

</p>



<p>

© 2026 TRAP MOVIES

</p>



</footer>






<script src="movie.js"></script>


</body>


</html>
