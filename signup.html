<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | TRAP MOVIES</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="logo">
<h2>🎬 TRAP MOVIES</h2>
</div>

</header>




<section class="auth">


<div class="auth-box">


<h2>
Create Account
</h2>



<input 
type="text"
id="name"
placeholder="Full Name"
>



<input 
type="email"
id="email"
placeholder="Email"
>



<input 
type="password"
id="password"
placeholder="Password"
>



<button onclick="signup()">
Create Account
</button>



<p>
Already have an account?

<a href="signin.html">
Login
</a>

</p>


</div>


</section>





<script type="module" src="auth.js"></script>


</body>

</html>
