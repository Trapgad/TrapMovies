<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRAP MOVIES | Series</title>


<link rel="stylesheet" href="style.css">


<link 
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<link 
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

</head>


<body>


<!-- HEADER -->

<header class="header">


<div class="menu-btn">
<i class="fa-solid fa-bars"></i>
</div>



<div class="logo">

TRAP <span>MOVIES</span>

</div>



<div class="search-btn">

<i class="fa-solid fa-magnifying-glass"></i>

</div>


</header>





<!-- SERIES HERO -->


<section class="series-hero">


<div class="series-backdrop"></div>



<div class="series-content">


<span class="tag">

🔥 Trending Series

</span>



<h1 id="seriesTitle">

Loading...

</h1>



<p id="seriesOverview">

Discover the best series on TRAP MOVIES.

</p>



<div class="hero-buttons">


<button class="watch">

<i class="fa-solid fa-play"></i>

Watch Now

</button>



<button class="info">

<i class="fa-solid fa-circle-info"></i>

More Info

</button>


</div>


</div>


</section>







<!-- SERIES SECTIONS -->


<main class="movie-sections">



<section class="movie-row">

<h2>
🔥 Trending Series
</h2>


<div class="movie-container" id="trendingSeries">

</div>


</section>





<section class="movie-row">

<h2>
⭐ Popular Series
</h2>


<div class="movie-container" id="popularSeries">

</div>


</section>







<section class="movie-row">

<h2>
📺 Airing Today
</h2>


<div class="movie-container" id="airingSeries">

</div>


</section>







<section class="movie-row">

<h2>
🏆 Top Rated Series
</h2>


<div class="movie-container" id="topSeries">

</div>


</section>




</main>






<footer>


<h2>
TRAP MOVIES
</h2>


<p>
Discover • Watch • Enjoy 🎬
</p>


<p>
© 2026 TRAP MOVIES
</p>


</footer>




<script src="series.js"></script>


</body>

</html>
